services:
  mysql:
    image: mysql:8.0
    container_name: info-kepegawaian-mysql
    profiles: ["internal-db"]
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-sisdmk2}
      MYSQL_USER: ${DB_USER:-pegawai}
      MYSQL_PASSWORD: ${DB_PASS:-pegawai123}
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: info-kepegawaian-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-Asia/Jakarta}
      DATABASE_URL: mysql://${DB_USER:-pegawai}:${DB_PASS:-pegawai123}@${DB_HOST:-mysql}:${DB_PORT:-3306}/${DB_NAME:-sisdmk2}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-pegawai}
      DB_PASS: ${DB_PASS:-pegawai123}
      DB_NAME: ${DB_NAME:-sisdmk2}
      JWT_SECRET: ${JWT_SECRET:-ganti-jwt-secret-anda}
      API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    container_name: info-kepegawaian-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3004
      TZ: ${TZ:-Asia/Jakarta}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-3004}:3004"

volumes:
  mysql_data:
